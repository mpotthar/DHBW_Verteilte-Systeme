<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Admin Webfrontend – Mein Urlaub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        /* Responsive Sidebar */
        @media (max-width: 767.98px) {
            .sidebar {
                position: static;
                width: 100%;
                padding: 15px;
            }
            .sidebar .nav-link {
                display: inline-block;
                padding: 0.5rem 1rem;
            }
            main {
                padding-top: 20px;
            }
        }
        @media (min-width: 768px) {
            .sidebar {
                position: fixed;
                top: 56px;
                bottom: 0;
                left: 0;
                width: 230px;
                padding: 20px;
                overflow-x: hidden;
                overflow-y: auto;
                background-color: #f8f9fa;
                border-right: 1px solid #dee2e6;
            }
            main {
                margin-left: 230px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Admin – Mein Urlaub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav d-lg-none">
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-module="hotels">Hotels</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-module="bewertungen">Bewertungen</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-module="fluege">Flugverbindungen</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-module="mietwagen">Mietwagen</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-module="demodaten">Demo-Daten</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar (sichtbar ab md-Größe) -->
            <nav class="sidebar d-none d-md-block">
                <div class="position-sticky">
                    <ul class="nav flex-column" id="sidebarMenu">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" data-module="hotels">
                                <i class="bi bi-building"></i> Hotels
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-module="bewertungen">
                                <i class="bi bi-star"></i> Bewertungen
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-module="fluege">
                                <i class="bi bi-airplane"></i> Flugverbindungen
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-module="mietwagen">
                                <i class="bi bi-car-front"></i> Mietwagen
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-module="demodaten">
                                <i class="bi bi-database-fill"></i> Demo-Daten
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
            
            <!-- Hauptinhalt des Admininterfaces -->
            <main class="col-12 col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4" id="mainContent">
                <!-- Dynamischer Content wird hier durch JS nachgeladen -->
            </main>
        </div>
    </div>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Admin Page Funktionaltitäten -->
    <script src="js/main.js"></script>
    <script src="js/hotels.js"></script>
    <script src="js/bewertungen.js"></script>
    <script src="js/fluege.js"></script>
    <script src="js/mietwagen.js"></script>
    <script src="js/demodaten.js"></script>
</body>
</html>
