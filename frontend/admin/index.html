<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Admin Webfrontend | Mein Urlaub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/img/favicon-admin.ico" type="image/x-icon">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .footer {
            background-color: #343a40;
            color: white;
            padding: 20px 0;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <!-- Navigationsleiste -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center mx-2" href="#">
                <img src="/img/logo.png" alt="Mein Urlaub Logo" height="48" class="me-3">
                <i class="bi bi-tools" style="color: #69becf;"></i>
                <span>&nbspAdmin UI</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-module="hotels"><i class="bi bi-houses"></i> Hotels</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-module="fluege"><i class="bi bi-airplane"></i>
                            Flugverbindungen</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-module="mietwagen"><i class="bi bi-car-front"></i>
                            Mietwagen</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-module="bewertungen"><i class="bi bi-star"></i>
                            Bewertungen</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-module="demodaten"><i class="bi bi-database"></i>
                            Demo-Daten</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <!-- Hauptinhalt des Admininterfaces -->
    <main class="flex-grow-1 container-fluid">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-11 px-1 py-4" id="mainContent"></div>
                <!-- Dynamischer Content wird hier durch JS nachgeladen -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer text-center">
        <div class="container">
            <div class="row d-flex align-items-center">
                <div class="col-12 col-md-9 px-4">
                    <a>&copy; 2025 Mein Urlaub - Ein Projekt im Rahmen der Vorlesung Verteilte Systeme an der DHBW
                        Heilbronn</a>
                </div>
                <div class="col-12 col-md-3 px-4 justify-content-md-end">
                    <a class="text-decoration-none link-light" href="/">
                        <i class="bi bi-door-open"></i> Admin UI verlassen
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <!-- Admin Page Funktionaltitäten -->
    <script src="js/main.js"></script>
    <script src="js/hotels.js"></script>
    <script src="js/bewertungen.js"></script>
    <script src="js/fluege.js"></script>
    <script src="js/mietwagen.js"></script>
    <script src="js/demodaten.js"></script>
</body>

</html>
