<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotels | Mein Urlaub</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .page-header {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('img/header_hotel.jpg') no-repeat center center;
            background-size: cover;
            color: white;
            padding: 60px 0;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .card {
            transition: transform 0.3s;
            margin-bottom: 20px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        .star-rating {
            color: #ffc107;
        }
        .navbar-brand {
            font-weight: 700;
            color: #0d6efd !important;
        }
        .footer {
            background-color: #343a40;
            color: white;
            padding: 20px 0;
            margin-top: 40px;
        }
        .badge-price {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            background-color: #0d6efd;
            color: white;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">Mein Urlaub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Start</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="hotels.html">Hotels</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="bewertungen.html">Bewertungen</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="fluege.html">Flüge</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mietwagen.html">Mietwagen</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header text-center">
        <div class="container">
            <h1 class="display-4">Hotels</h1>
            <p class="lead">Finden Sie die perfekte Unterkunft für Ihren Aufenthalt</p>
        </div>
    </div>

    <!-- Filter Section -->
    <div class="container mb-4">
        <div class="row">
            <div class="col-md-6 mb-3">
                <input type="text" id="hotelFilter" class="form-control" placeholder="Suchen Sie nach Hotels oder Orten...">
            </div>
            <div class="col-md-3 mb-3">
                <select id="starFilter" class="form-select">
                    <option value="0">Alle Sterne</option>
                    <option value="5">5 Sterne</option>
                    <option value="4">4 Sterne</option>
                    <option value="3">3 Sterne</option>
                    <option value="2">2 Sterne</option>
                    <option value="1">1 Stern</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <select id="sortOrder" class="form-select">
                    <option value="priceAsc">Preis: Aufsteigend</option>
                    <option value="priceDesc">Preis: Absteigend</option>
                    <option value="starsDesc">Sterne: Absteigend</option>
                    <option value="nameAsc">Name: A-Z</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Hotels Cards -->
    <div class="container">
        <div class="row" id="hotelCards">
            <!-- Cards werden dynamisch geladen -->
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Lade...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Hotel Details Modal -->
    <div class="modal fade" id="hotelModal" tabindex="-1" aria-labelledby="hotelModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="hotelModalLabel">Hotel Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
                </div>
                <div class="modal-body" id="hotelModalBody">
                    <!-- Details werden dynamisch geladen -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Schließen</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer text-center">
        <div class="container">
            <p>&copy; 2025 Mein Urlaub - Ein Beispielprojekt</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Hotels-spezifische Logik -->
    <script src="js/hotels.js"></script>
</body>
</html>
